<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Perfumes | Asset Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        .img-card:hover img { transform: scale(1.08); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>
<body class="bg-[#09090b] text-zinc-400 min-h-screen">

    <header class="sticky top-0 z-50 glass border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-white text-xl font-extrabold tracking-tighter italic">PERFUME_DB <span class="text-blue-500 text-sm not-italic font-normal ml-2 px-2 py-0.5 bg-blue-500/10 rounded-full border border-blue-500/20" id="counter">0 items</span></h1>
            </div>
            
            <div class="relative w-full md:w-96">
                <input type="text" id="search" placeholder="Buscar perfume por nombre..." 
                    class="w-full bg-white/5 border border-white/10 rounded-xl py-2 px-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all placeholder:text-zinc-600">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 md:p-10">
        <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-8">
            </div>
    </main>

    <script>
        const nombres = [
            'adidasamarilla', 'adidasrojo', 'aquafresh', 'arianagrande', 'armafcandy', 
            'bluebanderas', 'bluenigth', 'cancan', 'charliegold', 'clubdenuit', 
            'clubdenuitsprye', 'clubdenuitwoman', 'cold', 'cuerpodemujer', 'diselcuyeyo', 
            'dubai', 'dubainichebubbles', 'dubaiultimo', 'emper', 'galaxyayuda', 
            'geniusblush', 'glacier', 'guess', 'illusionintense', 'kamra', 'kumar', 
            'nauticaperronaosiosi', 'rush', 'vainillaazucar', 'victoriasecret', 'yara',
            'yaracandy', 'dubaivictory'
        ];

        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('search');
        const counter = document.getElementById('counter');

        function render(filter = '') {
            grid.innerHTML = '';
            const filtered = nombres.filter(n => n.toLowerCase().includes(filter.toLowerCase()));
            counter.innerText = `${filtered.length} items`;

            filtered.forEach(nombre => {
                const fileName = `${nombre}.png`;
                const path = `img/${fileName}`;

                const card = document.createElement('div');
                card.className = "img-card group cursor-pointer animate-in fade-in duration-500";
                
                card.onclick = () => {
                    navigator.clipboard.writeText(path);
                    showToast(path);
                };

                card.innerHTML = `
                    <div class="relative aspect-[4/5] overflow-hidden rounded-2xl bg-[#111] border border-white/5 flex items-center justify-center transition-all group-hover:border-blue-500/50 group-hover:shadow-[0_0_30px_-10px_rgba(59,130,246,0.3)]">
                        <img src="${path}" alt="${nombre}" class="w-full h-full object-contain p-4 transition-transform duration-500 ease-out" 
                             onerror="this.src='https://placehold.co/400x500/111/444?text=Missing'">
                        
                        <div class="absolute inset-0 bg-blue-600/0 group-hover:bg-blue-600/10 transition-colors flex items-center justify-center">
                            <span class="opacity-0 group-hover:opacity-100 bg-blue-500 text-white text-[10px] font-bold px-3 py-1.5 rounded-full translate-y-4 group-hover:translate-y-0 transition-all duration-300">
                                COPIAR RUTA
                            </span>
                        </div>
                    </div>
                    <div class="mt-3">
                        <h3 class="text-zinc-200 text-[11px] font-semibold tracking-wide uppercase truncate group-hover:text-blue-400 transition-colors">${nombre}</h3>
                        <p class="text-zinc-600 text-[10px] font-mono mt-0.5 lowercase italic">${fileName}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function showToast(text) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-8 left-1/2 -translate-x-1/2 glass border border-blue-500/30 text-white px-6 py-3 rounded-2xl text-xs font-bold shadow-2xl z-50 flex items-center gap-3";
            toast.innerHTML = `
                <span class="bg-blue-500 rounded-full p-1 italic uppercase text-[8px]">Ok</span>
                Ruta copiada: <span class="text-blue-400 font-mono">${text}</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 20px)';
                toast.style.transition = 'all 0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 2000);
        }

        searchInput.addEventListener('input', (e) => render(e.target.value));
        render(); // Carga inicial
    </script>
</body>
</html>
